name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, "fix/architecture"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: set up go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25

      - name: Install dependencies
        run: go mod tidy

      - name: Run tests
        run: go test -v ./...