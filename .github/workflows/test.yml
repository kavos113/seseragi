name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directories: ["./manager", "./manager-client/cli", "./runner", "./model"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: set up go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25

      - name: Install dependencies
        run: go mod tidy
        working-directory: ${{ matrix.directories }}

      - name: Run tests
        run: ./scripts/test.sh